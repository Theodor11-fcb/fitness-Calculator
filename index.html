<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness kalkulačka</title>
</head>
<body>
    <h1>Fitness kalkulačka</h1>

    <form id="activity-form">
        <label>Aktivita:</label>
        <option id="activity">Běh</option>
        <option id="activity">Plavání</option>
        <option id="activity">Posilování</option>

        <label id="duration">Čas (minuty):</label>
        <input type="number">

        <label id="sets">Série:</label>
        <input type="number">

        <label id="weight">Váha (kg):</label>
        <input type="number">

        <button>Přidat</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Aktivita</th>
                <th>Typ</th>
                <th>Hodnoty</th>
                <th>Kalorie</th>
            </tr>
        </thead>
        <tbody id="table-body">

        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
